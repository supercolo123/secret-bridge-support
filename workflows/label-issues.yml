name: Auto Label Issues

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels based on title/content
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || "").toLowerCase();

            let labels = [];

            // Bug detection
            if (title.includes("bug") || body.includes("error") || body.includes("exception") || body.includes("crash")) {
              labels.push("bug");
            }

            // Feature request detection
            if (title.includes("feature") || body.includes("request") || body.includes("suggest")) {
              labels.push("enhancement");
            }

            // Question detection
            if (title.includes("how") || body.includes("how to") || body.includes("question")) {
              labels.push("question");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }